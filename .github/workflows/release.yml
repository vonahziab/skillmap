name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go test ./...

      - name: Build binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o skillmap.exe .
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o skillmap_mac .
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o skillmap_linux .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skillmap.exe
            skillmap_mac
            skillmap_linux
          generate_release_notes: true
